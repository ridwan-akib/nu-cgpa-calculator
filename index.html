<!DOCTYPE html>
<html lang="bn">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>জিপিএ ক্যালকুলেটর - বাংলা বিভাগ</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.js"></script>
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); font-family: 'Noto Sans Bengali', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 10px; }
        .card { background: #ffffff; padding: 25px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); width: 100%; max-width: 500px; text-align: center; }
        .dept-title { color: #6c5ce7; font-weight: 700; margin-bottom: 20px; font-size: 20px; }
        .dev-name { font-size: 13px; color: #7f8c8d; margin-top: 20px; text-align: center; width: 100%; display: block; }
        
        /* বর্ষ সিলেকশন ডিজাইন */
        select { width: 100%; padding: 15px; border-radius: 15px; border: 3px solid #6c5ce7; font-size: 17px; background: #f0f4ff; cursor: pointer; color: #2d3436; font-weight: 700; }
        
        /* অপশন কালার ও বোল্ড */
        #yearSelect option[value="3rd"] { color: #0984e3; font-weight: bold; } /* লাল পরিবর্তন করে ব্লু করা হলো */
        #yearSelect option[value="4th"] { color: #27ae60; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #6c5ce7; color: white; padding: 10px; font-size: 14px; }
        td { padding: 8px 5px; border-bottom: 1px solid #eee; text-align: left; font-size: 14px; }
        .sub-code { font-weight: bold; color: #0984e3; }
        
        .btn-container { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        .calc-btn { background: #00b894; }
        .pdf-btn { background: #e17055; }
        
        #cgpaResult { margin-top: 15px; padding: 15px; border-radius: 10px; font-weight: bold; display: none; border: 1px solid #ddd; }
        #calculatorView { display: none; }
    </style>
</head>
<body>

<div class="card" id="cardToPrint">
    <div id="homeView">
        <h2 style="color:#2d3436">জাতীয় বিশ্ববিদ্যালয়</h2>
        <p class="dept-title">বাংলা বিভাগ জিপিএ ক্যালকুলেটর</p>
        <select id="yearSelect" onchange="loadCalculator()">
            <option value="" disabled selected>বর্ষ নির্বাচন করুন</option>
            <option value="3rd">অনার্স তৃতীয় বর্ষ</option>
            <option value="4th">অনার্স চতুর্থ বর্ষ</option>
        </select>
        <p class="dev-name">Developed by <strong>Md. Ridwan Ahmed Akib</strong></p>
    </div>

    <div id="calculatorView">
        <h2 id="yearTitle" style="color:#6c5ce7"></h2>
        <table>
            <thead><tr><th>কোড</th><th>বিষয়</th><th>গ্রেড</th></tr></thead>
            <tbody id="subjectTableBody"></tbody>
        </table>
        <div class="btn-container" id="buttonArea">
            <button class="calc-btn" onclick="calculateGPA()">Calculate GPA</button>
            <button class="pdf-btn" onclick="downloadPDF()">Download PDF</button>
        </div>
        <div id="cgpaResult"></div>
        <p id="reloadText" style="margin-top:20px; color:#6c5ce7; cursor:pointer; font-size: 14px; font-weight:bold;" onclick="location.reload()">◀ পুনরায় বর্ষ নির্বাচন করুন</p>
        <p class="dev-name">Developed by <strong>Md. Ridwan Ahmed Akib</strong></p>
    </div>
</div>

<script>
    const data = {
        '3rd': [
            {code: "231001", name: "বাংলা সাহিত্যের ইতিহাস-২"}, {code: "231003", name: "প্রাচীন ও মধ্যযুগের কবিতা"},
            {code: "231005", name: "বাংলা ছোটগল্প-১"}, {code: "231007", name: "ফোকলোর তত্ত্ব ও বাংলা লোকসাহিত্য"},
            {code: "231009", name: "রূপতত্ত্ব, রসতত্ত্ব, অলঙ্কার, ছন্দ"}, {code: "231011", name: "বাংলা প্রবন্ধ-১"},
            {code: "231013", name: "বাংলা রম্য ও ভ্রমণ সাহিত্য"}, {code: "231015", name: "বাংলা উপন্যাস-২"}
        ],
        '4th': [
            {code: "241001", name: "বাংলা সাহিত্যের ইতিহাস-৩"}, {code: "241003", name: "বাংলা উপন্যাস-৩"},
            {code: "241005", name: "পাশ্চাত্য সাহিত্য তত্ত্ব"}, {code: "241007", name: "বাংলা নাটক-২"},
            {code: "241009", name: "চিরায়ত সাহিত্য অনূদিত"}, {code: "241011", name: "বাংলা ছোটগল্প-২"},
            {code: "241013", name: "বাংলা কবিতা-৩"}, {code: "241015", name: "ধ্বনিবিজ্ঞান ও ভাষাতত্ত্ব"},
            {code: "241017", name: "বাংলাদেশের মুক্তিযুদ্ধ বিষয়ক সাহিত্য"}, {code: "241018", name: "ভাইভা"}
        ]
    };

    function loadCalculator() {
        let year = document.getElementById('yearSelect').value;
        document.getElementById('homeView').style.display = 'none';
        document.getElementById('calculatorView').style.display = 'block';
        document.getElementById('yearTitle').innerText = (year === '3rd' ? "অনার্স তৃতীয় বর্ষ" : "অনার্স চতুর্থ বর্ষ");
        
        let tbody = document.getElementById('subjectTableBody');
        tbody.innerHTML = '';
        data[year].forEach(sub => {
            tbody.innerHTML += `<tr><td class="sub-code">${sub.code}</td><td>${sub.name}</td>
                <td><select class="grade-select" style="padding:4px; border-radius:5px; border:1px solid #6c5ce7; color:#6c5ce7; font-weight:bold;">
                    <option value="4.00">A+</option><option value="3.75">A</option><option value="3.50">A-</option>
                    <option value="3.25">B+</option><option value="3.00">B</option><option value="2.75">B-</option>
                    <option value="2.50">C+</option><option value="2.25">C</option><option value="2.00">D</option><option value="0.00">F</option>
                </select></td></tr>`;
        });
    }

    function calculateGPA() {
        var selects = document.getElementsByClassName("grade-select");
        var totalPoints = 0, failCount = 0;
        for (var i = 0; i < selects.length; i++) {
            var val = parseFloat(selects[i].value);
            if (val === 0.00) failCount++;
            totalPoints += val;
        }
        var resultDiv = document.getElementById("cgpaResult");
        resultDiv.style.display = "block";
        if (failCount > 0) {
            resultDiv.style.background = "#ff7675"; resultDiv.style.color = "white";
            resultDiv.innerText = "আপনি " + failCount + "টি বিষয়ে ফেল করেছেন!";
        } else {
            resultDiv.style.background = "#55efc4"; resultDiv.style.color = "#2d3436";
            resultDiv.innerText = "আপনার জিপিএ: " + (totalPoints / selects.length).toFixed(2);
        }
    }

    function downloadPDF() {
        var element = document.getElementById('calculatorView');
        var buttons = document.getElementById('buttonArea');
        var reloadText = document.getElementById('reloadText');
        
        buttons.style.display = 'none';
        reloadText.style.display = 'none'; // পিডিএফ-এ এই লেখাটি লুকানো হলো
        
        html2pdf(element, {
            margin: 10, filename: 'GPA_Result.pdf',
            html2canvas: { scale: 2 }
        }).then(() => { 
            buttons.style.display = 'flex'; 
            reloadText.style.display = 'block'; // পিডিএফ ডাউনলোডের পর আবার দেখানো হলো
        });
    }
</script>
</body>
</html>
