<!DOCTYPE html>
<html lang="bn">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-F8XPW4CQQ3"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-F8XPW4CQQ3');
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বাংলা ৩য় বর্ষ সিজিপিএ ক্যালকুলেটর</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.js"></script>
    <style>
        body { background: linear-gradient(135deg, #74ebd5, #9face6); min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; font-family: 'Segoe UI', sans-serif; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 100%; max-width: 550px; }
        .header { text-align: center; margin-bottom: 15px; }
        h1 { color: #2c3e50; font-size: 22px; margin: 0; }
        .dept-title { text-align: center; color: #16a085; font-weight: bold; margin-bottom: 5px; }
        .dev-name { text-align: center; font-size: 13px; color: #7f8c8d; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
        th { background-color: #f2f2f2; padding: 10px; font-size: 14px; text-align: left; border-bottom: 2px solid #ddd; }
        td { padding: 8px 5px; font-size: 14px; border-bottom: 1px solid #eee; }
        .sub-code { font-weight: bold; color: #34495e; width: 70px; }
        .select-style { width: 100%; padding: 6px; border: 1px solid #ddd; border-radius: 5px; cursor: pointer; }
        
        .btn-container { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 10px; font-weight: bold; color: white; }
        .calc-btn { background: #2980b9; }
        .pdf-btn { background: #e67e22; }
        
        #cgpaResult { margin-top: 15px; padding: 12px; border-radius: 8px; text-align: center; font-weight: bold; display: none; font-size: 18px; }
    </style>
</head>
<body>

<div class="card" id="cardToPrint">
    <div class="header"><h1>জাতীয় বিশ্ববিদ্যালয়</h1></div>
    <p class="dept-title">বাংলা বিভাগ - ৩য় বর্ষ</p>
    <p class="dev-name">Developed by <strong>Md. Ridwan Ahmed Akib</strong></p>
    
    <table>
        <tr>
            <th>কোড</th>
            <th>বিষয়</th>
            <th>গ্রেড</th>
        </tr>
        <script>
            const subjects = [
                {code: "231001", name: "বাংলা সাহিত্যের ইতিহাস-২"},
                {code: "231003", name: "প্রাচীন ও মধ্যযুগের কবিতা"},
                {code: "231005", name: "বাংলা ছোটগল্প-১"},
                {code: "231007", name: "ফোকলোর তত্ত্ব ও বাংলা লোকসাহিত্য"},
                {code: "231009", name: "রূপতত্ত্ব, রসতত্ত্ব, অলঙ্কার, ছন্দ"},
                {code: "231011", name: "বাংলা প্রবন্ধ-১"},
                {code: "231013", name: "বাংলা রম্য ও ভ্রমণ সাহিত্য"},
                {code: "231015", name: "বাংলা উপন্যাস-২"}
            ];
            subjects.forEach(sub => {
                document.write(`
                    <tr>
                        <td class="sub-code">${sub.code}</td>
                        <td>${sub.name}</td>
                        <td>
                            <select class="select-style grade-select">
                                <option value="4.00">A+</option><option value="3.75">A</option>
                                <option value="3.50">A-</option><option value="3.25">B+</option>
                                <option value="3.00">B</option><option value="2.75">B-</option>
                                <option value="2.50">C+</option><option value="2.25">C</option>
                                <option value="2.00">D</option><option value="0.00">F</option>
                            </select>
                        </td>
                    </tr>
                `);
            });
        </script>
    </table>

    <div class="btn-container" id="buttonArea">
        <button class="calc-btn" onclick="calculateCGPA()">Calculate</button>
        <button class="pdf-btn" onclick="downloadPDF()">Download PDF</button>
    </div>
    <div id="cgpaResult"></div>
</div>

<script>
    function calculateCGPA() {
        var selects = document.getElementsByClassName("grade-select");
        var totalPoints = 0;
        var failCount = 0;
        for (var i = 0; i < selects.length; i++) {
            var val = parseFloat(selects[i].value);
            if (val === 0.00) failCount++;
            totalPoints += val;
        }
        var resultDiv = document.getElementById("cgpaResult");
        resultDiv.style.display = "block";
        if (failCount > 0) {
            resultDiv.style.backgroundColor = "#e74c3c";
            resultDiv.style.color = "white";
            resultDiv.innerText = "আপনি " + failCount + "টি বিষয়ে ফেল করেছেন!";
        } else {
            var finalCgpa = totalPoints / selects.length;
            resultDiv.style.backgroundColor = "#27ae60";
            resultDiv.style.color = "white";
            resultDiv.innerText = "আপনার ৩য় বর্ষের সিজিপিএ: " + finalCgpa.toFixed(2);
        }
    }

    function downloadPDF() {
        var buttons = document.getElementById('buttonArea');
        buttons.style.display = 'none'; // পিডিএফ-এ বাটন লুকানোর জন্য

        var element = document.getElementById('cardToPrint');
        html2pdf(element, {
            margin: 10,
            filename: 'CGPA_Result.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        }).then(() => {
            buttons.style.display = 'flex'; // ডাউনলোড শেষে বাটন আবার দেখা যাবে
        });
    }
</script>

</body>
</html>
